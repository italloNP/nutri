name: CI — Lint, Type Check & Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Prettier ────────────────────────────────────────────────────────────
      - name: Check formatting (Prettier)
        run: npm run format:check

      # ── ESLint ──────────────────────────────────────────────────────────────
      - name: Run ESLint
        run: npm run lint

      # ── TypeScript ──────────────────────────────────────────────────────────
      - name: Type check (tsc --noEmit)
        run: npm run type-check

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality

    env:
      # Minimal env vars required for a successful Next.js build
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret' }}
      NEXTAUTH_URL: 'http://localhost:3000'
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/nutri_ci' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'sk-placeholder' }}
      SKIP_ENV_VALIDATION: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
